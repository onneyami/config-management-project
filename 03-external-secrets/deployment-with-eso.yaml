apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-eso
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eso-demo
  template:
    metadata:
      labels:
        app: eso-demo
    spec:
      containers:
      - name: app
        image: nginx:latest
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret-from-vault
              key: API_KEY
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret-from-vault
              key: DB_PASSWORD