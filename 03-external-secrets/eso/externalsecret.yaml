apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-demo-secret
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: app-secret-from-vault  
    creationPolicy: Owner
  data:
  - secretKey: API_KEY
    remoteRef:
      key: secret/demo-app
      property: api-key
  - secretKey: DB_PASSWORD
    remoteRef:
      key: secret/demo-app
      property: db-password